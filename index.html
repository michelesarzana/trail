<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Every Single Trail — No map is ever finished.</title>
<meta name="description" content="Every Single Trail — No map is ever finished. Una mappa personale di percorsi di montagna.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; }
body { margin: 0; background: #faf7f4; font-family: 'Manrope', sans-serif; color: #2e2b38; }
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-thumb { background: rgba(46,43,56,0.16); border-radius: 4px; }
a { color: #38324a; text-decoration: none; }
a:hover { color: #c17b8c; }
button { font-family: 'Manrope', sans-serif; cursor: pointer; border: none; }

/* ===== SHELL — FULL SCREEN ===== */
.shell {
  width: 100%;
  background: #fff;
  min-height: 100vh;
}

/* ===== NAV ===== */
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 48px;
  background: #fff;
  border-bottom: 1px solid rgba(46,43,56,0.08);
  position: sticky;
  top: 0;
  z-index: 100;
}
.nav-wordmark-wrap {
  display: flex;
  flex-direction: row;
  align-items: baseline;
  gap: 0.4em;
  text-decoration: none;
}
.nav-wordmark {
  font-size: 22px;
  font-weight: 800;
  color: #2e2b38;
  letter-spacing: -0.01em;
  text-decoration: none;
  line-height: 1.1;
}
.nav-wordmark:hover { color: #2e2b38; }
.nav-payoff {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 22px;
  color: #c17b8c;
  letter-spacing: 0.01em;
  opacity: 0.85;
}
.nav-right {
  display: flex;
  align-items: center;
  gap: 24px;
}
.nav-counter {
  font-size: 13px;
  font-weight: 600;
  color: #726e7a;
}
.nav-counter span { font-weight: 800; color: #2e2b38; }
.nav-add {
  font-size: 13px;
  font-weight: 700;
  color: #38324a;
  background: #f0edf0;
  padding: 8px 16px;
  border-radius: 999px;
  transition: background .15s;
  text-decoration: none;
}
.nav-add:hover { background: #e4dfe4; color: #38324a; }

/* ===== HERO WITH SEARCH ===== */
.hero {
  padding: 48px 48px 32px;
  border-bottom: 1px solid rgba(46,43,56,0.06);
  background: linear-gradient(180deg, #faf7f4 0%, #fff 100%);
}
.hero-brand {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 36px;
  line-height: 1.08;
  color: #38324a;
  margin: 0 0 24px;
  opacity: 0.6;
}
.hero-search-wrap {
  max-width: 680px;
  margin: 0 auto 20px;
  position: relative;
}
.hero-search-input {
  width: 100%;
  padding: 18px 56px 18px 24px;
  font-size: 17px;
  font-family: 'Manrope', sans-serif;
  font-weight: 500;
  border: 2px solid rgba(56,50,74,0.15);
  border-radius: 16px;
  background: #fff;
  color: #2e2b38;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
  box-shadow: 0 4px 20px rgba(56,50,74,0.08);
}
.hero-search-input:focus {
  border-color: #c17b8c;
  box-shadow: 0 4px 24px rgba(193,123,140,0.18);
}
.hero-search-icon {
  position: absolute;
  right: 18px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 20px;
  color: #726e7a;
  pointer-events: none;
}

/* ===== FILTERS (horizontal chips under search) ===== */
.filters-hero {
  max-width: 680px;
  margin: 0 auto;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}
.filters-label {
  font-size: 10.5px;
  font-weight: 700;
  color: #726e7a;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-right: 2px;
}
.chip {
  border: none;
  border-radius: 999px;
  padding: 6px 14px;
  font-size: 12.5px;
  font-weight: 600;
  cursor: pointer;
  transition: background .15s, color .15s;
  background: #f0edf0;
  color: #726e7a;
  font-family: 'Manrope', sans-serif;
}
.chip.active {
  background: #c17b8c;
  color: #fff;
}
.chip:hover:not(.active) { background: #e4dfe4; }
.filters-sep {
  width: 1px;
  height: 20px;
  background: rgba(46,43,56,0.12);
  margin: 0 4px;
}

/* ===== MAP + LIST LAYOUT ===== */
.map-list-wrap {
  display: flex;
  height: calc(100vh - 240px);
  min-height: 600px;
}

/* ===== SIDEBAR (list) ===== */
.sidebar {
  width: 460px;
  min-width: 360px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  border-right: 1px solid rgba(46,43,56,0.08);
  overflow: hidden;
}

.results-label {
  font-size: 12px;
  font-weight: 700;
  color: #726e7a;
  padding: 12px 24px 0;
}

/* ===== TRAIL LIST ===== */
.trail-list {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px 24px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.trail-list::-webkit-scrollbar { width: 6px; }
.trail-list::-webkit-scrollbar-thumb { background: rgba(46,43,56,0.12); border-radius: 3px; }

/* ===== TRAIL CARD ===== */
.trail-card {
  background: #fff;
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid rgba(46,43,56,0.07);
  transition: border-color .15s, box-shadow .15s;
  display: flex;
  flex-direction: column;
  text-decoration: none;
  color: inherit;
}
.trail-card:hover {
  border-color: #c17b8c;
  box-shadow: 0 4px 18px rgba(193,123,140,0.13);
  color: inherit;
}
.trail-card-cover {
  height: 150px;
  background: #f0edf0;
  position: relative;
  overflow: hidden;
}
.trail-card-cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.trail-card-badge {
  position: absolute;
  top: 10px;
  left: 10px;
  font-size: 11px;
  font-weight: 800;
  padding: 4px 10px;
  border-radius: 8px;
  letter-spacing: 0.02em;
}
.badge-done { background: rgba(56,50,74,0.9); color: #fff; }
.badge-todo { background: rgba(255,255,255,0.92); color: #726e7a; }
.trail-card-body {
  padding: 14px 16px;
  flex: 1;
}
.trail-card-title {
  font-size: 14.5px;
  font-weight: 800;
  color: #2e2b38;
  margin: 0 0 4px;
  line-height: 1.3;
}
.trail-card-location {
  font-size: 12px;
  color: #726e7a;
  margin: 0 0 8px;
  font-weight: 500;
}
.trail-card-stats {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.trail-card-stats-left {
  display: flex;
  gap: 10px;
  font-size: 12.5px;
  font-weight: 700;
  color: #2e2b38;
}
.stat-accent { color: #c17b8c; }
.trail-card-stars { font-size: 12px; color: #c17b8c; margin-top: 6px; }
.card-link {
  font-size: 12px;
  font-weight: 700;
  color: #c17b8c;
}

/* ===== MAP ===== */
.map-area {
  flex: 1;
  position: relative;
}
#map {
  width: 100%;
  height: 100%;
}

/* ===== LEAFLET POPUP ===== */
.leaflet-popup-content-wrapper {
  padding: 0 !important;
  border-radius: 14px !important;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(46,43,56,0.18) !important;
}
.leaflet-popup-content { margin: 0 !important; }
.leaflet-popup-tip-container { display: none; }
.map-tooltip {
  width: 240px;
  background: #fff;
  border-radius: 14px;
  overflow: hidden;
  font-family: 'Manrope', sans-serif;
}
.map-tooltip-cover {
  height: 110px;
  position: relative;
}
.map-tooltip-cover img { width: 100%; height: 100%; object-fit: cover; }
.map-tooltip-body { padding: 12px 14px; }
.map-tooltip-title { font-size: 14px; font-weight: 800; color: #2e2b38; margin: 0 0 4px; }
.map-tooltip-loc { font-size: 11.5px; color: #726e7a; margin: 0 0 8px; }
.map-tooltip-stats { display: flex; gap: 12px; font-size: 11.5px; font-weight: 700; color: #2e2b38; margin-bottom: 10px; }
.map-tooltip-btn {
  display: block;
  text-align: center;
  background: #c17b8c;
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  border-radius: 10px;
  padding: 8px;
  text-decoration: none;
  transition: background .15s;
}
.map-tooltip-btn:hover { background: #a85e73; color: #fff; }

/* ===== NO RESULTS ===== */
.no-results {
  padding: 60px 20px;
  text-align: center;
  color: #8a897f;
}
.no-results-icon { font-size: 32px; margin-bottom: 10px; }

/* ===== FOOTER ===== */
.footer {
  padding: 28px 48px;
  border-top: 1px solid rgba(46,43,56,0.08);
  font-size: 12.5px;
  color: #726e7a;
  text-align: center;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
  .nav { padding: 16px 24px; }
  .hero { padding: 32px 24px 20px; }
  .hero-brand { font-size: 26px; }
  .hero-search-input { font-size: 15px; padding: 14px 48px 14px 18px; }
  .map-list-wrap { flex-direction: column; height: auto; }
  .sidebar { width: 100%; min-width: 0; border-right: none; border-bottom: 1px solid rgba(46,43,56,0.08); }
  .trail-list { max-height: 50vh; }
  .map-area { height: 50vh; }
  .footer { padding: 20px 24px; }
}
</style>
</head>
<body>
<div class="shell" id="app-shell">
  <!-- NAV -->
  <nav class="nav">
    <a href="index.html" class="nav-wordmark-wrap">
      <span class="nav-wordmark">Every Single Trail</span>
      <span class="nav-payoff">No map is ever finished.</span>
    </a>
    <div class="nav-right">
      <a href="search.html" class="nav-btn" style="padding:7px 12px;font-size:13px;">🔍</a>
      <span class="nav-counter" data-i18n-template="counter"><span id="count-done">0</span> / <span id="count-total">0</span> fatti</span>
      <a href="admin/index.html" class="nav-add" data-i18n="nav-add">+ Aggiungi trail</a>
    </div>
  </nav>

  <!-- HERO WITH SEARCH -->
  <div class="hero">
    
    <div class="hero-search-wrap">
      <input type="search" id="search-input" class="hero-search-input" placeholder="Cerca un percorso..." autocomplete="off">
      <span class="hero-search-icon">🔍</span>
    </div>
    <div class="filters-hero" id="filters-hero">
      <!-- chips injected by JS -->
    </div>
  </div>

  <!-- RESULTS LABEL -->
  <div class="results-label" id="results-label"></div>

  <!-- MAP + LIST -->
  <div class="map-list-wrap">
    <div class="sidebar">
      <div class="trail-list" id="trail-list">
        <div class="no-results"><div class="no-results-icon">⏳</div>Caricamento…</div>
      </div>
    </div>
    <div class="map-area">
      <div id="map"></div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    Every Single Trail — No map is ever finished.
  </footer>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>
<script>
/* ===== CONFIG ===== */
const DB_URL = 'https://raw.githubusercontent.com/michelesarzana/trail/main/data/trails.json';
const GPX_BASE = 'https://raw.githubusercontent.com/michelesarzana/trail/main/';

/* ===== STATE ===== */
let allTrails = [];
let leafletMap = null;
let markers = [];
let gpxLayers = [];
let activeStatus = 'all';
let activeDiff = 'all';
let activeAct = 'all';
let searchQuery = '';

/* ===== UTILITIES ===== */
function fmtDist(km) { return km != null ? km + ' km' : '—'; }
function fmtGain(m) { return m != null ? '+' + m + ' m' : '—'; }
function fmtDur(min) {
  if (!min) return '—';
  const h = Math.floor(min / 60), m = min % 60;
  return h > 0 ? (m > 0 ? h + 'h ' + m + 'min' : h + 'h') : m + ' min';
}
function coverSrc(t) {
  const photos = (t.media || {}).photos || [];
  return (t.media || {}).cover || t.cover_image || photos[0] || null;
}
function todoBg() {
  return 'repeating-linear-gradient(45deg,#efe9ec,#efe9ec 14px,#e3dbe1 14px,#e3dbe1 28px)';
}
function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function stars(n) { return n ? '★'.repeat(n) + '☆'.repeat(5-n) : ''; }
function locationLine(t) {
  const loc = t.location || {};
  return [loc.municipality, loc.province].filter(Boolean).join(', ') || loc.region || '';
}

/* ===== SEARCH FILTER ===== */
function matchesSearch(t, q) {
  if (!q) return true;
  q = q.toLowerCase();
  const fields = [t.title, t.description, (t.location||{}).municipality, (t.location||{}).region, (t.location||{}).province].filter(Boolean);
  return fields.some(f => f.toLowerCase().includes(q));
}

/* ===== FILTERED TRAILS ===== */
function filteredTrails() {
  return allTrails.filter(t => {
    if (activeStatus !== 'all' && t.status !== activeStatus) return false;
    if (activeDiff !== 'all') {
      if ((t.classification || {}).difficulty !== activeDiff) return false;
    }
    if (activeAct !== 'all') {
      const acts = (t.classification || {}).activity_types || [];
      if (!acts.includes(activeAct)) return false;
    }
    if (!matchesSearch(t, searchQuery)) return false;
    return true;
  });
}

/* ===== RENDER TRAIL CARD ===== */
function renderCard(t) {
  const isDone = t.status === 'done';
  const cover = coverSrc(t);
  const track = t.track || {};
  const loc = t.location || {};

  let coverHtml;
  if (cover) {
    coverHtml = `<img src="${escHtml(cover)}" alt="${escHtml(t.title)}" loading="lazy">`;
  } else {
    coverHtml = `<div style="width:100%;height:100%;background:${todoBg()}"></div>`;
  }

  const starsHtml = isDone && t.rating ? `<div class="trail-card-stars">${stars(t.rating)}</div>` : '';
  const actLabel = (t.classification || {}).activity_types?.[0] || '';
  const diff = (t.classification || {}).difficulty || '';

  return `
  <a class="trail-card" href="trails/${t.id}/">
    <div class="trail-card-cover">
      ${coverHtml}
      <div class="trail-card-badge ${isDone ? 'badge-done' : 'badge-todo'}">
        ${isDone ? '✓ Fatto' : '◷ Da fare'}
      </div>
    </div>
    <div class="trail-card-body">
      <h3 class="trail-card-title">${escHtml(t.title)}</h3>
      <p class="trail-card-location">${escHtml(locationLine(t))}${actLabel ? ' · ' + escHtml(actLabel) : ''}</p>
      <div class="trail-card-stats">
        <div class="trail-card-stats-left">
          <span>${fmtDist(track.distance_km)}</span>
          <span class="stat-accent">${fmtGain(track.elevation_gain)}</span>
          ${diff ? `<span>${escHtml(diff)}</span>` : ''}
          ${track.duration_min ? `<span>${fmtDur(track.duration_min)}</span>` : ''}
        </div>
        <span class="card-link">Dettagli →</span>
      </div>
      ${starsHtml}
    </div>
  </a>`;
}

/* ===== RENDER MAP TOOLTIP ===== */
function renderTooltip(t) {
  const cover = coverSrc(t);
  const track = t.track || {};
  let covHtml;
  if (cover) {
    covHtml = `<img src="${escHtml(cover)}" alt="${escHtml(t.title)}">`;
  } else {
    covHtml = `<div style="width:100%;height:100%;background:${todoBg()}"></div>`;
  }
  return `
  <div class="map-tooltip">
    <div class="map-tooltip-cover">${covHtml}</div>
    <div class="map-tooltip-body">
      <p class="map-tooltip-title">${escHtml(t.title)}</p>
      <p class="map-tooltip-loc">${escHtml(locationLine(t))}</p>
      <div class="map-tooltip-stats">
        <span>${fmtDist(track.distance_km)}</span>
        <span style="color:#c17b8c">${fmtGain(track.elevation_gain)}</span>
      </div>
      <a href="trails/${t.id}/" class="map-tooltip-btn">Scopri →</a>
    </div>
  </div>`;
}

/* ===== CUSTOM MARKER ===== */
function makeMarker(t) {
  const isDone = t.status === 'done';
  const color = isDone ? '#38324a' : '#c17b8c';
  const html = `<div style="width:16px;height:16px;border-radius:50%;background:${color};border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.3);"></div>`;
  return L.divIcon({ html, className: '', iconSize: [16,16], iconAnchor: [8,8] });
}

/* ===== RENDER MAP MARKERS + GPX TRACKS ===== */
function renderMap(trails) {
  // Remove old markers
  markers.forEach(m => m.remove());
  markers = [];
  // Remove old GPX layers
  gpxLayers.forEach(l => { try { leafletMap.removeLayer(l); } catch(e) {} });
  gpxLayers = [];

  const bounds = [];

  trails.forEach(t => {
    const loc = t.location || {};
    const coords = (loc.coordinates || {});
    const start = coords.start || {};

    if (start.lat) {
      bounds.push([start.lat, start.lng || start.lon]);
      const marker = L.marker([start.lat, start.lng || start.lon], { icon: makeMarker(t) });
      marker.bindPopup(renderTooltip(t), { maxWidth: 260, minWidth: 240 });
      marker.addTo(leafletMap);
      markers.push(marker);
    }

    // Load GPX track if available
    if ((t.track || {}).gpx_file) {
      const gpxUrl = GPX_BASE + t.track.gpx_file;
      const gpxLayer = new L.GPX(gpxUrl, {
        async: true,
        polyline_options: {
          color: '#c17b8c',
          weight: 3,
          opacity: 0.85
        },
        marker_options: {
          startIconUrl: null,
          endIconUrl: null,
          shadowUrl: null,
          wptIconUrls: { '': null }
        }
      });
      gpxLayer.on('loaded', function(e) {
        // click on track → go to trail page
        e.target.getLayers().forEach(layer => {
          if (layer.on) {
            layer.on('click', () => { window.location.href = 'trails/' + t.id + '/'; });
          }
        });
      });
      gpxLayer.on('error', function() {});
      gpxLayer.addTo(leafletMap);
      gpxLayers.push(gpxLayer);
    }
  });

  if (bounds.length === 1) {
    leafletMap.setView(bounds[0], 11);
  } else if (bounds.length > 1) {
    leafletMap.fitBounds(bounds, { padding: [40, 40], maxZoom: 12 });
  }
}

/* ===== APPLY FILTERS ===== */
function applyFilters() {
  const filtered = filteredTrails();

  // List
  const listEl = document.getElementById('trail-list');
  const label = document.getElementById('results-label');
  if (filtered.length === 0) {
    listEl.innerHTML = `<div class="no-results"><div class="no-results-icon">🏔️</div>Nessun percorso trovato.</div>`;
  } else {
    listEl.innerHTML = filtered.map(renderCard).join('');
  }
  label.textContent = filtered.length + ' percors' + (filtered.length === 1 ? 'o' : 'i');

  // Map
  renderMap(filtered);
}

/* ===== BUILD FILTER CHIPS ===== */
function buildFilterChips(trails) {
  const statusValues = ['done', 'todo'];
  const diffs = [...new Set(trails.flatMap(t => [(t.classification || {}).difficulty].filter(Boolean)))];
  const acts = [...new Set(trails.flatMap(t => (t.classification || {}).activity_types || []))];

  const container = document.getElementById('filters-hero');
  container.innerHTML = '';

  // Status
  const addChip = (label, onclick, active) => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (active ? ' active' : '');
    btn.textContent = label;
    btn.onclick = onclick;
    container.appendChild(btn);
  };

  const T = TRANSLATIONS[localStorage.getItem('est-lang') || 'it'] || TRANSLATIONS['it'];
  addChip(T['chip-all'], () => { activeStatus = 'all'; rebuildChips(); applyFilters(); }, activeStatus === 'all');
  addChip(T['chip-done'], () => { activeStatus = 'done'; rebuildChips(); applyFilters(); }, activeStatus === 'done');
  addChip(T['chip-todo'], () => { activeStatus = 'todo'; rebuildChips(); applyFilters(); }, activeStatus === 'todo');

  if (diffs.length > 0) {
    const sep = document.createElement('div');
    sep.className = 'filters-sep';
    container.appendChild(sep);
    diffs.forEach(d => {
      addChip(d, () => { activeDiff = activeDiff === d ? 'all' : d; rebuildChips(); applyFilters(); }, activeDiff === d);
    });
  }

  if (acts.length > 0) {
    const sep2 = document.createElement('div');
    sep2.className = 'filters-sep';
    container.appendChild(sep2);
    acts.forEach(a => {
      addChip(a, () => { activeAct = activeAct === a ? 'all' : a; rebuildChips(); applyFilters(); }, activeAct === a);
    });
  }
}

function rebuildChips() { buildFilterChips(allTrails); }

/* ===== SEARCH HANDLER ===== */
function setupSearch() {
  const input = document.getElementById('search-input');
  input.addEventListener('input', function() {
    searchQuery = this.value.trim();
    applyFilters();
  });
}

/* ===== INIT MAP ===== */
function initMap() {
  leafletMap = L.map('map', { zoomControl: true }).setView([42.5, 12.5], 6);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(leafletMap);
}

/* ===== LOAD DATA ===== */
async function loadTrails() {
  try {
    const r = await fetch(DB_URL);
    const data = await r.json();
    return data.trails || [];
  } catch(e) {
    console.error('Failed to load trails:', e);
    return [];
  }
}

/* ===== INIT ===== */
async function init() {
  initMap();
  setupSearch();

  allTrails = await loadTrails();

  // Update nav counter
  const done = allTrails.filter(t => t.status === 'done').length;
  document.getElementById('count-total').textContent = allTrails.length;
  document.getElementById('count-done').textContent = done;

  buildFilterChips(allTrails);
  applyFilters();
}

document.addEventListener('DOMContentLoaded', init);


// Restore language on load
(function() {
  const saved = localStorage.getItem('est-lang') || 'it';
  document.addEventListener('DOMContentLoaded', function() { setLang(saved); });
})();

</script>
</body>
</html>
